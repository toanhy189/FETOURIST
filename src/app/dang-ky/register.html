<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBSITE - Đăng ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="register.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">
            <img src="" alt="icon"> <span>WEBSITE_NAME</span>
        </div>
        
        <nav class="nav-menu">
            <a href="#">Trang Chủ</a>
            <a href="#">Giới Thiệu</a>
            <div class="dropdown">
                <a href="#">Tours <i class="fa-solid fa-chevron-down"></i></a>
            </div>
            <a href="#">Điểm Đến</a>
            <a href="#">Liên Hệ</a>
        </nav>

        <div class="header-actions">
            <button class="btn-book">Book Now <i class="fa-solid fa-arrow-up-right-from-square"></i></button>
            <div class="user-icon">
                <i class="fa-solid fa-circle-user"></i>
                <i class="fa-solid fa-caret-down"></i>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <div class="register-card">
            <div class="form-container">
                <h1 class="title">Đăng ký</h1>
                <form>
                    <div class="input-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" placeholder="Tên tài khoản">
                    </div>
                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" placeholder="Email">
                    </div>
                    <div class="input-field">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" placeholder="Mật khẩu">
                    </div>
                    <div class="input-field">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="password" placeholder="Nhập lại mật khẩu">
                    </div>
                    <button type="button" class="btn-register">Đăng ký</button>
                </form>
            </div>

            <div class="image-container">
                <img src="../image/register_1.png" alt="Work Illustration">
                 <a href="../dang-nhap/login.html" class="footer-link">Tôi đã có tài khoản</a>
            </div>
        </div>
    </main>

</body>
</html>
